<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Green background matching app primary color -->
  <rect width="32" height="32" rx="7" fill="#2e7d32"/>
  <!-- Ball outline -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="white" stroke-width="1.5"/>
  <!-- Center pentagon (the black patch on a soccer ball) -->
  <polygon points="16,11 20.76,14.46 18.94,20.05 13.06,20.05 11.24,14.46" fill="white"/>
  <!-- 5 seam lines radiating from pentagon vertices to circle edge -->
  <line x1="16" y1="11" x2="16" y2="3" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20.76" y1="14.46" x2="28.38" y2="12" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="18.94" y1="20.05" x2="23.64" y2="26.53" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="13.06" y1="20.05" x2="8.36" y2="26.53" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="11.24" y1="14.46" x2="3.62" y2="12" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
</svg>
